{% extends "base.html" %}
{% load static %}

{% block title %}Ask a Question | NAMETS{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'community/css/community.css' %}">
{% endblock %}

{% block content %}
<div class="community-page">
    <h1 class="page-title animate-on-scroll">Ask a Question</h1>

    <div class="form-container glass-card animate-on-scroll">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <a href="{% url 'community:question_list' %}" class="btn btn-secondary" style="margin-top: 35px; border-radius:23px"">← Back to Q&A</a>
</div>
{% endblock %}
